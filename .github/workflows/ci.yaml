name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format

      - run: pnpm typecheck

      - name: Start regtest hsd
        run: docker compose -f docker/compose.dev.yaml --profile hsd up -d --wait

      - run: pnpm test
        env:
          HSD_TEST_NODE_URL: http://127.0.0.1:14037
          HSD_TEST_WALLET_URL: http://127.0.0.1:14039
          HSD_TEST_API_KEY: devkey

      - name: Run integration tests against regtest hsd
        run: |
          pnpm --filter @alice-hns-wallet/hsd-client test:integration
          pnpm --filter @alice-hns-wallet/server test:integration
        env:
          HSD_TEST_NODE_URL: http://127.0.0.1:14037
          HSD_TEST_WALLET_URL: http://127.0.0.1:14039
          HSD_TEST_API_KEY: devkey

      - name: Stop regtest hsd
        if: always()
        run: docker compose -f docker/compose.dev.yaml --profile hsd down -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
